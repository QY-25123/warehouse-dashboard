services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .                        # project root — Dockerfile COPYs schema.sql/seed.sql
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env                  # loads DATABASE_URL, Supabase keys, Telegram, Anthropic
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s


