services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-warehouse}
      POSTGRES_USER:     ${POSTGRES_USER:-warehouse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # initdb.d runs once on a fresh volume — primary DB initialisation path.
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse_user} -d ${POSTGRES_DB:-warehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .                        # project root — Dockerfile COPYs schema.sql/seed.sql
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST:          db
      POSTGRES_PORT:          5432
      POSTGRES_DB:            ${POSTGRES_DB:-warehouse}
      POSTGRES_USER:          ${POSTGRES_USER:-warehouse_user}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD:-warehouse_pass}
      SUPABASE_JWT_SECRET:    ${SUPABASE_JWT_SECRET:-}
      SUPABASE_URL:           ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    environment:
      # Used by Server Components for container-to-container SSR fetches.
      API_INTERNAL_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
